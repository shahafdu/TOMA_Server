# TOMA monorepo CI (GitLab). Mirrors .github/workflows/ci.yml — both call ci/*.sh so
# they cannot drift (plan §2.9). GitLab Free tier only: plain stages/jobs, cache, artifacts,
# rules, services — no Premium/Ultimate features (no merge trains, no security-dashboard scanners).

default:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - apk add --no-cache bash
    - npm config set cache .npm --global

stages:
  - install
  - verify

install:
  stage: install
  script:
    - ./ci/install.sh
  artifacts:
    paths:
      - node_modules/
      - packages/*/node_modules/
      - apps/*/node_modules/
      - db/node_modules/
    expire_in: 1 hour

verify:
  stage: verify
  needs: ['install']
  services:
    - name: mariadb:10.11
      alias: mariadb
  variables:
    MARIADB_ROOT_PASSWORD: root
    # Admin connection used by ci/db-setup.sh (GitLab services are reachable by alias).
    MOCKDB_HOST: mariadb
    MOCKDB_ROOT_PASSWORD: root
    # App connection (the seed creates the `toma` user).
    MARIADB_HOST: mariadb
    MARIADB_USER: toma
    MARIADB_PASSWORD: toma
    MARIADB_DATABASE: coma
  script:
    - ./ci/db-setup.sh
    - ./ci/checks.sh
