name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Modern monorepo CI. The legacy Angular client and Express server keep their own
# (Jenkins/GitLab) pipelines and are intentionally not built here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install
        run: ./ci/install.sh

      - name: Checks (format, lint, typecheck, contract, test, build)
        run: ./ci/checks.sh
